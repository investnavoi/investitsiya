name: Rejalashtirilgan Email Yuborish

on:
  schedule:
    # Har 30 daqiqada tekshiradi — aniq vaqtni dashboard dan tanlash mumkin
    - cron: '0,30 * * * *'
  workflow_dispatch: # Qo'lda ham ishga tushirish mumkin

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Kutubxonalarni o'rnatish
        run: npm install nodemailer firebase-admin

      - name: Email yuborish skriptini ishga tushirish
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node scripts/send-scheduled-emails.js
