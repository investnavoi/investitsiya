<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forumlar</title>
</head>
<body>
<script>
  (function(){
    var current = new URL(window.location.href);
    var target = new URL('../index.html', window.location.href);
    current.searchParams.forEach(function(value, key){
      if(key !== 'page') target.searchParams.set(key, value);
    });
    target.searchParams.set('page', 'forums');
    if(current.hash) target.hash = current.hash;
    window.location.replace(target.toString());
  })();
</script>
<noscript>
  <a href="../index.html?page=forums">Sahifani ochish</a>
</noscript>
</body>
</html>
