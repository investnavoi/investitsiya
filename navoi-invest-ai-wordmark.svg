<svg xmlns="http://www.w3.org/2000/svg" width="980" height="290" viewBox="0 0 980 290" fill="none">
  <defs>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .w1{font-family:"Sora","Montserrat","Arial",sans-serif;font-weight:900;fill:#ffffff;letter-spacing:1px}
      .w2{font-family:"Sora","Montserrat","Arial",sans-serif;font-weight:800;fill:#ffffff;letter-spacing:.8px}
      .tag{font-family:"Inter","Arial",sans-serif;font-weight:600;fill:#ffffff;opacity:.94}
      .node{fill:#ffffff}
      .line{stroke:#ffffff;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;opacity:.95}
      .arrow{fill:none;stroke:#ffffff;stroke-width:14;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <g transform="translate(18 22)" filter="url(#softGlow)">
    <text class="w1" x="0" y="104" font-size="146">NAVOI</text>
    <text class="w2" x="0" y="206" font-size="120">INVEST AI</text>

    <!-- Upward arrow woven into INVEST -->
    <path class="arrow" d="M286 192 C298 164, 315 136, 332 106" />
    <path class="arrow" d="M332 106 L314 116" />
    <path class="arrow" d="M332 106 L338 126" />

    <!-- AI network mark on the right -->
    <g transform="translate(745 135)">
      <path class="line" d="M0 48 L22 18 L62 8 L87 36 L63 72 L24 82 Z"/>
      <path class="line" d="M22 18 L24 82"/>
      <path class="line" d="M62 8 L63 72"/>
      <path class="line" d="M22 18 L63 72"/>
      <path class="line" d="M62 8 L24 82"/>
      <circle class="node" cx="0" cy="48" r="5"/>
      <circle class="node" cx="22" cy="18" r="5"/>
      <circle class="node" cx="62" cy="8" r="5"/>
      <circle class="node" cx="87" cy="36" r="5"/>
      <circle class="node" cx="63" cy="72" r="5"/>
      <circle class="node" cx="24" cy="82" r="5"/>
    </g>

    <text class="tag" x="4" y="250" font-size="42">Empowering Growth. Shaping Tomorrow.</text>
  </g>
</svg>
